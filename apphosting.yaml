# Firebase App Hosting config (https://firebase.google.com/docs/app-hosting/configure).
#
# Only NEXT_PUBLIC_FIREBASE_* values live here — they're the client SDK config, which
# .env.example already documents as "public — safe to expose to the browser" (Next.js inlines
# them into the client bundle at build time, so BUILD availability is required; RUNTIME is added
# too since the same values are read on the server for SSR). FIREBASE_ADMIN_* (used only by the
# local seed script, see SETUP.md) and the Resend API key (Secret Manager-backed, used only by
# Cloud Functions) are intentionally absent — the deployed app itself never needs either.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDYB_hPDAGzk9-8O4c6JLc9qOsMVIaH9Nw"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "nanuda-3f1a9.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "nanuda-3f1a9"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "nanuda-3f1a9.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1053841345456"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:1053841345456:web:80f0633b04311733eaa475"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-LSZCR5R27K"
    availability:
      - BUILD
      - RUNTIME
  # NEXT_PUBLIC_TOSS_CLIENT_KEY intentionally omitted here for now — App Hosting's apphosting.yaml
  # schema rejects an empty `value: ""` (that's what broke the first deploy attempt of this file).
  # Add it back once a real key (test or live) is issued from
  # https://developers.tosspayments.com/my/api-keys:
  #   - variable: NEXT_PUBLIC_TOSS_CLIENT_KEY
  #     value: "test_ck_..."
  #     availability:
  #       - BUILD
  #       - RUNTIME
  # Until then, the 응원하기(support) button shows a clear "not configured" error client-side.
