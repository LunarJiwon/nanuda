<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>* { box-sizing: border-box; }</style>
</helmet>
<div style="display:flex;align-items:flex-start;gap:56px;padding:64px 72px;background:#e7e5e0;font-family:'Pretendard',sans-serif;min-width:max-content">

  <!-- DESKTOP -->
  <div style="display:flex;flex-direction:column;gap:16px;flex:none">
    <div style="display:flex;align-items:baseline;gap:10px">
      <span style="font-size:15px;font-weight:600;color:#0e0e0e">데스크톱 · 웹앱</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a887f">1180 × 760</span>
    </div>
    <div style="width:1180px;height:760px;background:#fff;border:1px solid #cfcdc6;border-radius:9px;box-shadow:0 30px 70px -30px rgba(0,0,0,0.4);overflow:hidden;display:flex;flex-direction:column">
      <div style="flex:none;height:38px;background:#f3f1ed;border-bottom:1px solid #e2e0da;display:flex;align-items:center;padding:0 14px;gap:8px">
        <span style="width:11px;height:11px;border-radius:50%;background:#dcdad4"></span>
        <span style="width:11px;height:11px;border-radius:50%;background:#dcdad4"></span>
        <span style="width:11px;height:11px;border-radius:50%;background:#dcdad4"></span>
        <span style="margin:0 auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#9a988f;background:#fff;border:1px solid #e5e3de;border-radius:4px;padding:3px 22px">nanuda.blog</span>
      </div>
      <div style="flex:1;min-height:0">
        <dc-import name="BlogApp" mode="desktop" hint-size="100%,100%" style="width:100%;height:100%"></dc-import>
      </div>
    </div>
  </div>

  <!-- MOBILE -->
  <div style="display:flex;flex-direction:column;gap:16px;flex:none">
    <div style="display:flex;align-items:baseline;gap:10px">
      <span style="font-size:15px;font-weight:600;color:#0e0e0e">모바일</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a887f">390 × 800</span>
    </div>
    <div style="width:414px;height:824px;background:#111;border-radius:44px;padding:12px;box-shadow:0 30px 70px -30px rgba(0,0,0,0.5);flex:none">
      <div style="width:100%;height:100%;background:#fff;border-radius:33px;overflow:hidden;position:relative;display:flex;flex-direction:column">
        <div style="position:absolute;top:9px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#111;border-radius:14px;z-index:50"></div>
        <div style="flex:1;min-height:0">
          <dc-import name="BlogApp" mode="mobile" hint-size="100%,100%" style="width:100%;height:100%"></dc-import>
        </div>
      </div>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
